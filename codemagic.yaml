workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 18
      groups:
        - android_credentials # Definir no Codemagic UI
      vars:
        PACKAGE_NAME: "com.fleetpay.app"
    scripts:
      - name: Instalar dependências
        script: npm ci
      - name: Sincronizar Capacitor
        script: npx cap sync android
      - name: Build Android Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal # internal, alpha, beta, production

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: 18
      cocoapods: default
      groups:
        - ios_credentials # Definir no Codemagic UI
      vars:
        BUNDLE_ID: "com.fleetpay.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Instalar dependências
        script: npm ci
      - name: Sincronizar Capacitor
        script: npx cap sync ios
      - name: Instalar CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Configurar code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration # Configurar no Codemagic UI
        submit_to_testflight: true
